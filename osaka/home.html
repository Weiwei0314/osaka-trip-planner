<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="行程表">
  <meta name="theme-color" content="#007AFF">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>旅行行程表</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header id="app-header">
    <button id="btn-back" class="hdr-btn"></button>
    <span id="header-title">我的行程</span>
    <button id="btn-add" class="hdr-btn hdr-btn-add">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </header>
  <input type="file" accept=".json,application/json" id="import-file-input" style="display:none">

  <!-- ── Main content ── -->
  <main id="app-main">
    <div id="screen-trips" class="screen"></div>
    <div id="screen-detail" class="screen" style="display:none"></div>
  </main>

  <!-- ── Bottom tab bar (detail screen only) ── -->
  <nav id="tab-bar" style="display:none">
    <button class="tab-btn active" data-tab="timeline">
      <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>時間軸</span>
    </button>
    <button class="tab-btn" data-tab="shopping">
      <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>購物</span>
    </button>
    <button class="tab-btn" data-tab="todo">
      <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>代辦</span>
    </button>
  </nav>

  <!-- ── Modal overlay ── -->
  <div id="modal-overlay" style="display:none">

    <!-- Trip modal -->
    <div id="modal-trip" class="modal" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3 id="modal-trip-title">新增行程</h3>
        <button class="modal-done" id="save-trip">完成</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>行程名稱 <span class="req">*</span></label>
          <input type="text" id="trip-name" placeholder="例如：大阪五日遊">
        </div>
        <div class="form-group">
          <label>目的地</label>
          <input type="text" id="trip-destination" placeholder="例如：日本大阪">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>出發日期</label>
            <input type="date" id="trip-start">
          </div>
          <div class="form-group">
            <label>返回日期</label>
            <input type="date" id="trip-end">
          </div>
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="trip-notes" placeholder="預算、注意事項等..."></textarea>
        </div>
      </div>
    </div>

    <!-- Event modal -->
    <div id="modal-event" class="modal" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3 id="modal-event-title">新增行程項目</h3>
        <button class="modal-done" id="save-event">完成</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>標題 <span class="req">*</span></label>
          <input type="text" id="event-title-input" placeholder="例如：參觀大阪城">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>日期</label>
            <input type="date" id="event-date">
          </div>
          <div class="form-group">
            <label>分類</label>
            <select id="event-category">
              <option value="attraction">景點</option>
              <option value="food">餐廳</option>
              <option value="transport">交通</option>
              <option value="accommodation">住宿</option>
              <option value="shopping">購物</option>
              <option value="other">其他</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="event-has-time">
            設定時間
          </label>
        </div>
        <div id="event-time-fields" style="display:none">
          <div class="form-group">
            <label>開始時間</label>
            <div class="wheel-picker">
              <div class="wheel-col" id="wheel-start-ampm"></div>
              <div class="wheel-col" id="wheel-start-hour"></div>
              <div class="wheel-col" id="wheel-start-min"></div>
              <div class="wheel-highlight"></div>
            </div>
          </div>
          <div class="form-group">
            <label>停留時間</label>
            <div class="wheel-picker wheel-picker-duration">
              <div class="wheel-col" id="wheel-dur-hour"></div>
              <span class="wheel-unit">時</span>
              <div class="wheel-col" id="wheel-dur-min"></div>
              <span class="wheel-unit">分</span>
              <div class="wheel-highlight"></div>
            </div>
            <div class="duration-end-preview" id="duration-end-preview"></div>
          </div>
        </div>
        <input type="hidden" id="event-start-time">
        <input type="hidden" id="event-end-time">
        <div class="form-group">
          <label>地點</label>
          <input type="text" id="event-location-input" placeholder="地點名稱或地址">
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="event-notes" placeholder="票價、注意事項..."></textarea>
        </div>
        <div class="form-group">
          <label>照片</label>
          <div class="photo-strip" id="event-photo-strip"></div>
          <input type="file" accept="image/*" multiple data-photo-kind="event" class="photo-file-input" id="event-photos-input">
        </div>
      </div>
    </div>

    <!-- Shopping modal -->
    <div id="modal-shopping" class="modal" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3 id="modal-shopping-title">新增購物項目</h3>
        <button class="modal-done" id="save-shopping">完成</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>品項名稱 <span class="req">*</span></label>
          <input type="text" id="shopping-name" placeholder="例如：章魚燒">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>數量</label>
            <input type="text" id="shopping-qty" placeholder="例如：2份">
          </div>
          <div class="form-group">
            <label>預估金額 (¥)</label>
            <input type="number" id="shopping-price" placeholder="0" min="0">
          </div>
        </div>
        <div class="form-group">
          <label>分類</label>
          <input type="text" id="shopping-category" placeholder="例如：美食、紀念品">
        </div>
        <div class="form-group">
          <label>所屬天數</label>
          <select id="shopping-date"></select>
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="shopping-notes" placeholder="哪裡買、備注..."></textarea>
        </div>
        <div class="form-group">
          <label>照片</label>
          <div class="photo-strip" id="shopping-photo-strip"></div>
          <input type="file" accept="image/*" multiple data-photo-kind="shopping" class="photo-file-input" id="shopping-photos-input">
        </div>
      </div>
    </div>

    <!-- Todo modal -->
    <div id="modal-todo" class="modal" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3 id="modal-todo-title">新增代辦事項</h3>
        <button class="modal-done" id="save-todo">完成</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>事項名稱 <span class="req">*</span></label>
          <input type="text" id="todo-title-input" placeholder="例如：訂機票">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>截止日期</label>
            <input type="date" id="todo-due">
          </div>
          <div class="form-group">
            <label>優先度</label>
            <select id="todo-priority">
              <option value="high">🔴 高</option>
              <option value="medium" selected>🟡 中</option>
              <option value="low">🟢 低</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>所屬天數</label>
          <select id="todo-assigned-date"></select>
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="todo-notes" placeholder="備注..."></textarea>
        </div>
        <div class="form-group">
          <label>照片</label>
          <div class="photo-strip" id="todo-photo-strip"></div>
          <input type="file" accept="image/*" multiple data-photo-kind="todo" class="photo-file-input" id="todo-photos-input">
        </div>
      </div>
    </div>

    <!-- Location modal -->
    <div id="modal-location" class="modal" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3 id="modal-location-title">新增地點</h3>
        <button class="modal-done" id="save-location">完成</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>地點名稱 <span class="req">*</span></label>
          <input type="text" id="location-name" placeholder="例如：大阪城">
        </div>
        <div class="form-group">
          <label>地址</label>
          <input type="text" id="location-address" placeholder="地址（選填）">
        </div>
        <div class="form-group">
          <label>分類</label>
          <select id="location-category">
            <option value="attraction">景點</option>
            <option value="food">餐廳／美食</option>
            <option value="accommodation">住宿</option>
            <option value="shopping">購物</option>
            <option value="transport">交通</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>備註</label>
          <textarea id="location-notes" placeholder="開放時間、票價、注意事項..."></textarea>
        </div>
      </div>
    </div>

    <!-- Move event modal -->
    <div id="modal-move" class="modal modal-sm" style="display:none">
      <div class="modal-nav">
        <button class="modal-cancel">取消</button>
        <h3>移動到哪一天</h3>
        <button class="modal-done" id="save-move">確定</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>目標日期</label>
          <select id="move-event-date"></select>
        </div>
      </div>
    </div>

    <!-- Confirm modal -->
    <div id="modal-confirm" class="modal modal-sm" style="display:none">
      <div class="modal-body confirm-body">
        <p id="confirm-msg" class="confirm-msg">確定要刪除？</p>
        <div class="confirm-btns">
          <button id="confirm-cancel" class="btn-cancel-confirm">取消</button>
          <button id="confirm-ok" class="btn-ok-confirm">刪除</button>
        </div>
      </div>
    </div>

  </div><!-- /modal-overlay -->

  <!-- Photo lightbox -->
  <div id="photo-lightbox" style="display:none">
    <img id="photo-lightbox-img" src="" alt="">
  </div>

</div><!-- /app -->
<script src="app.js"></script>
</body>
</html>
